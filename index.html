<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Feedback Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  display:flex;
  flex-direction:column;
}

h1 {
  text-align:center;
  margin:10px;
  font-size:22px;
  letter-spacing:1px;
}

.main {
  flex:1;
  display:flex;
  gap:10px;
  padding:10px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:15px;
  padding:15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.15);
}

.left, .right {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* COUNTS */
.count {
  margin:6px 0;
  padding:6px;
  border-radius:8px;
  transition:0.3s;
}

.count.active {
  transform:scale(1.1);
  background:rgba(56,189,248,0.2);
}

/* SUMMARY */
#summary {
  margin-top:10px;
  font-size:16px;
  color:#22c55e;
  font-weight:bold;
}

/* QR */
#qrcode {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:white;
  border-radius:10px;
  padding:10px;
}

#qrcode span {
  color:black;
  font-size:14px;
  margin-bottom:5px;
}

/* CHART */
.chart-box {
  flex:2;
}

canvas {
  width:100% !important;
  height:100% !important;
}

/* BUTTON */
button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:#ef4444;
  color:white;
  cursor:pointer;
}

#qrCanvas {
  width: 150px !important;
  height: 150px !important;
  display: block;
  margin: 10px auto;
}
</style>

</head>

<body>

<h1>🚀 AI Smart Feedback Dashboard</h1>

<div class="main">

<div class="left">

<div class="card">
<h3>📊 Feedback Stats</h3>

<div class="count" id="c1">🌟 Excellent: <span id="excellent">0</span></div>
<div class="count" id="c2">😊 Good: <span id="good">0</span></div>
<div class="count" id="c3">😐 Average: <span id="avg">0</span></div>
<div class="count" id="c4">😞 Poor: <span id="poor">0</span></div>

<div id="summary">Waiting for data...</div>
</div>

<div class="card">
  <span style="display:block; text-align:center;">📱 Scan to Give Feedback</span>
  <canvas id="qrCanvas"></canvas>
</div>

</div>

<div class="right">

<div class="card chart-box">
<canvas id="chart"></canvas>
</div>

<div class="card">
<button onclick="resetData()">Reset Data</button>
</div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCa3o3idfUH5aqc_-qA8QltRcrpJvc7ztc",
  authDomain: "feedback-system-29224.firebaseapp.com",
  databaseURL: "https://feedback-system-29224-default-rtdb.firebaseio.com",
  projectId: "feedback-system-29224",
  storageBucket: "feedback-system-29224.firebasestorage.app",
  messagingSenderId: "286323051625",
  appId: "1:286323051625:web:e610e0237c1657be6e26f8",
  measurementId: "G-PMX45F8Q3N"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let excellent=0, good=0, avg=0, poor=0;

const chart = new Chart(document.getElementById('chart'), {
  type:'bar',
  data:{
    labels:['Excellent','Good','Average','Poor'],
    datasets:[{
      data:[0,0,0,0],
      borderRadius:10,
      backgroundColor:[
        '#22c55e',
        '#3b82f6',
        '#facc15',
        '#ef4444'
      ]
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    animation:{duration:1000},
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:"white"}},
      y:{ticks:{color:"white"}, beginAtZero:true}
    }
  }
});

function highlight(maxIndex){
  ['c1','c2','c3','c4'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle("active", i===maxIndex);
  });
}

function summary(){
  let total = excellent+good+avg+poor;
  if(total===0) return "No feedback yet.";

  let arr=[excellent,good,avg,poor];
  let maxIndex=arr.indexOf(Math.max(...arr));

  highlight(maxIndex);

  let percent=Math.round(arr[maxIndex]/total*100);

  const msgs=[
    "🌟 Outstanding experience!",
    "😊 Mostly positive feedback!",
    "😐 Average experience.",
    "⚠️ Needs improvement!"
  ];

  return msgs[maxIndex] + " ("+percent+"%)";
}

db.ref("feedbacks").on("value",(snap)=>{
  excellent=good=avg=poor=0;

  snap.forEach(c=>{
    let r=c.val().rating;
    if(r==="Excellent") excellent++;
    else if(r==="Good") good++;
    else if(r==="Average") avg++;
    else if(r==="Poor") poor++;
  });

  document.getElementById("excellent").innerText=excellent;
  document.getElementById("good").innerText=good;
  document.getElementById("avg").innerText=avg;
  document.getElementById("poor").innerText=poor;

  chart.data.datasets[0].data=[excellent,good,avg,poor];
  chart.update();

  document.getElementById("summary").innerText=summary();
});

function resetData(){
  if(confirm("Reset all feedback?")){
    db.ref("feedbacks").remove();
  }
}

QRCode.toCanvas(
  document.getElementById('qrCanvas'),
  "https://devvvvvvv7.github.io/feedback/mobile.html",
  { width: 160 }
);
</script>

</body>
</html>
