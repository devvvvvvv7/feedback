<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Give Feedback</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  text-align:center;
}

h1 {
  margin-bottom:20px;
}

button {
  display:block;
  width:200px;
  margin:10px auto;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
}

.excellent { background:#22c55e; }
.good { background:#3b82f6; }
.average { background:#facc15; color:black; }
.poor { background:#ef4444; }

#msg {
  margin-top:15px;
  font-size:18px;
  color:#38bdf8;
}
</style>

</head>

<body>

<div class="container">
  <h1>📱 Give Your Feedback</h1>

<button class="excellent" onclick="send('Excellent')">🌟 Excellent</button> <button class="good" onclick="send('Good')">😊 Good</button> <button class="average" onclick="send('Average')">😐 Average</button> <button class="poor" onclick="send('Poor')">😞 Poor</button>

  <div id="msg"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCa3o3idfUH5aqc_-qA8QltRcrpJvc7ztc",
  authDomain: "feedback-system-29224.firebaseapp.com",
  databaseURL: "https://feedback-system-29224-default-rtdb.firebaseio.com",
  projectId: "feedback-system-29224",
  storageBucket: "feedback-system-29224.firebasestorage.app",
  messagingSenderId: "286323051625",
  appId: "1:286323051625:web:e610e0237c1657be6e26f8",
  measurementId: "G-PMX45F8Q3N"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function send(rating) {
  let data = {
    rating: rating,
    timestamp: Date.now(),
    device: "Mobile"
  };

  db.ref("feedbacks").push(data);

  document.getElementById("msg").innerText = "✅ Thank you!";
}
</script>

</body>
</html>
