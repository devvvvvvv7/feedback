<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Give Feedback</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  text-align:center;
  width: 90%;
  max-width: 300px;
}

h1 {
  margin-bottom:20px;
}

button {
  display:block;
  width:100%;
  margin:10px 0;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
  transition:0.2s;
}

button:hover {
  transform: scale(1.05);
}

.excellent { background:#22c55e; }
.good { background:#3b82f6; }
.average { background:#facc15; color:black; }
.poor { background:#ef4444; }

#msg {
  margin-top:15px;
  font-size:18px;
  color:#38bdf8;
}
</style>

</head>

<body>

<div class="container" id="mainUI">
  <h1>📱 Give Your Feedback</h1>

<button class="excellent" onclick="send('Excellent')">🌟 Excellent</button> <button class="good" onclick="send('Good')">😊 Good</button> <button class="average" onclick="send('Average')">😐 Average</button> <button class="poor" onclick="send('Poor')">😞 Poor</button>

  <div id="msg"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCa3o3idfUH5aqc_-qA8QltRcrpJvc7ztc",
  authDomain: "feedback-system-29224.firebaseapp.com",
  databaseURL: "https://feedback-system-29224-default-rtdb.firebaseio.com",
  projectId: "feedback-system-29224",
  storageBucket: "feedback-system-29224.firebasestorage.app",
  messagingSenderId: "286323051625",
  appId: "1:286323051625:web:e610e0237c1657be6e26f8",
  measurementId: "G-PMX45F8Q3N"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔒 If already submitted → block UI
if (localStorage.getItem("submitted")) {
  document.getElementById("mainUI").innerHTML = 
    "<h2>✅ You already submitted feedback</h2>";
}

function send(rating) {

  // prevent multiple submissions
  if (localStorage.getItem("submitted")) {
    alert("You already submitted feedback!");
    return;
  }

  let data = {
    rating: rating,
    timestamp: Date.now(),
    device: "Mobile"
  };

  db.ref("feedbacks").push(data);

  // mark as submitted
  localStorage.setItem("submitted", "true");

  // show thank you screen
  document.getElementById("mainUI").innerHTML = 
    "<h2>🎉 Thank You for Your Feedback!</h2>";
}
</script>

</body>
</html>
